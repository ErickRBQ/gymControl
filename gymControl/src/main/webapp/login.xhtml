<!DOCTYPE html>

<html class="dark" lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Gym Controller | Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #051424; /* surface-dim from config */
            color: #d4e4fa; /* on-surface */
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(30, 30, 30, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glow-input:focus {
            border-color: #4be277;
            box-shadow: 0px 0px 0px 2px rgba(75, 226, 119, 0.2);
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.5; }
        }

        .animate-pulse-slow {
            animation: pulse-slow 8s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#b4c5ff",
                        "tertiary": "#ffb5ab",
                        "surface-dim": "#051424",
                        "inverse-on-surface": "#233143",
                        "surface-container-highest": "#273647",
                        "primary-container": "#22c55e",
                        "on-surface": "#d4e4fa",
                        "surface-container-lowest": "#010f1f",
                        "inverse-primary": "#006e2f",
                        "outline": "#869585",
                        "inverse-surface": "#d4e4fa",
                        "tertiary-fixed": "#ffdad5",
                        "on-tertiary-fixed-variant": "#7f2a21",
                        "error": "#ffb4ab",
                        "surface-tint": "#4ae176",
                        "on-surface-variant": "#bccbb9",
                        "tertiary-fixed-dim": "#ffb4a9",
                        "on-secondary-fixed-variant": "#003ea8",
                        "surface-container-low": "#0d1c2d",
                        "primary": "#4be277",
                        "background": "#051424",
                        "on-secondary-fixed": "#00174b",
                        "secondary-fixed": "#dbe1ff",
                        "on-primary-container": "#004b1e",
                        "on-error": "#690005",
                        "on-background": "#d4e4fa",
                        "surface": "#051424",
                        "surface-bright": "#2c3a4c",
                        "on-error-container": "#ffdad6",
                        "error-container": "#93000a",
                        "on-primary-fixed": "#002109",
                        "primary-fixed-dim": "#4ae176",
                        "outline-variant": "#3d4a3d",
                        "on-tertiary-container": "#76231b",
                        "secondary-fixed-dim": "#b4c5ff",
                        "on-tertiary-fixed": "#410001",
                        "surface-container": "#122131",
                        "primary-fixed": "#6bff8f"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-sm": "8px",
                        "stack-md": "16px",
                        "stack-lg": "32px",
                        "unit": "4px",
                        "container-padding": "24px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "display": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-sm": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "display": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background flex items-center justify-center min-h-screen relative">
<!-- Background Layer with Image -->
<div class="absolute inset-0 z-0 overflow-hidden">
    <div class="w-full h-full opacity-40 grayscale" data-alt="A cinematic, low-angle shot of a high-end commercial gym at night, featuring rows of high-performance black exercise machines and weights. The atmosphere is moody and modern, with sharp neon green accents reflecting off polished concrete floors. Subdued, atmospheric blue and charcoal tones create a professional SaaS aesthetic. Soft focus in the background emphasizes the depth and scale of the premium fitness facility." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAVtgI-Cic_JqeK08smW3Qyc3yK33tGcIbrUQOSXlo6jkIMHdefNNxVIIxZrnX7eE6Pq5R2S2AOjsMMj55KZpog_kkeft-rvks3EN8Cw6AzxY0r2RBhaSVC_e0iAa_xqgmv9g8SAhnfaYjgos5KgbV6nGu2XOldNMtlTyR5IcHZaT_N0bhr8NnDLtsiHMooDtvatzB8cNxaZzaVuuH5WX7UQhXUs7UVo-4_dVla6UFQ20BnXP7jM0NM')">
    </div>
    <!-- Gradient Overlay for Contrast -->
    <div class="absolute inset-0 bg-gradient-to-tr from-background via-background/90 to-transparent"></div>
    <div class="absolute inset-0 animate-pulse-slow bg-[radial-gradient(circle_at_50%_50%,rgba(75,226,119,0.05),transparent_50%)]"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-md px-6 py-12">
    <div class="glass-panel p-8 md:p-10 rounded-xl flex flex-col items-center">
        <!-- Brand Anchor -->
        <div class="mb-10 text-center">
            <div class="flex items-center justify-center mb-4">
                <div class="w-12 h-12 bg-primary rounded-lg flex items-center justify-center shadow-[0_0_20px_rgba(75,226,119,0.3)]">
                    <span class="material-symbols-outlined text-background font-bold text-3xl" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
                </div>
            </div>
            <h1 class="font-display text-headline-md md:text-headline-lg text-on-surface uppercase tracking-tighter">Gym Controller</h1>
            <p class="font-body-md text-on-surface-variant mt-2">Welcome back</p>
        </div>
        <!-- Login Form -->
        <form class="w-full space-y-6" onsubmit="event.preventDefault();">
            <!-- Email Input Group -->
            <div class="space-y-2">
                <label class="font-label-md text-on-surface-variant block" for="email">Email Address</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
                        <span class="material-symbols-outlined text-[20px]">alternate_email</span>
                    </div>
                    <input class="w-full h-14 bg-white/5 border border-white/10 rounded-lg pl-12 pr-4 text-on-surface glow-input transition-all outline-none placeholder:text-on-surface-variant/30" id="email" placeholder="admin@apexfitness.com" required="" type="email"/>
                </div>
            </div>
            <!-- Password Input Group -->
            <div class="space-y-2">
                <div class="flex justify-between items-center">
                    <label class="font-label-md text-on-surface-variant block" for="password">Password</label>
                    <a class="font-label-sm text-primary hover:underline transition-all" href="#">Forgot Password?</a>
                </div>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
                        <span class="material-symbols-outlined text-[20px]">lock</span>
                    </div>
                    <input class="w-full h-14 bg-white/5 border border-white/10 rounded-lg pl-12 pr-4 text-on-surface glow-input transition-all outline-none placeholder:text-on-surface-variant/30" id="password" placeholder="••••••••" required="" type="password"/>
                    <button class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant hover:text-on-surface" type="button">
                        <span class="material-symbols-outlined text-[20px]">visibility</span>
                    </button>
                </div>
            </div>
            <!-- Action Button -->
            <div class="pt-4">
                <button class="w-full h-14 bg-primary text-background font-bold rounded-lg flex items-center justify-center gap-2 hover:brightness-110 active:scale-[0.98] transition-all shadow-[0_8px_24px_rgba(75,226,119,0.2)]" type="submit">
                    Log In
                    <span class="material-symbols-outlined">login</span>
                </button>
            </div>
        </form>
        <!-- Footer Links -->
        <div class="mt-8 text-center">
            <p class="font-body-sm text-on-surface-variant">
                Don't have an account?
                <a class="text-primary font-bold hover:underline" href="#">Contact Apex Fitness</a>
            </p>
        </div>
    </div>
    <!-- Micro-Interactions Script -->
    <script>
        // Subtle hover effect on inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Toggle Password Visibility
        const togglePass = document.querySelector('button[type="button"]');
        const passInput = document.getElementById('password');
        if (togglePass &amp;&amp; passInput) {
            togglePass.addEventListener('click', () => {
                const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passInput.setAttribute('type', type);
                togglePass.querySelector('.material-symbols-outlined').textContent = type === 'password' ? 'visibility' : 'visibility_off';
            });
        }
    </script>
</main>
<!-- Support Help FAB (Optional Modern Touch) -->
<div class="fixed bottom-8 right-8 z-20">
    <button class="w-12 h-12 rounded-full bg-surface-container-highest border border-white/10 flex items-center justify-center text-on-surface shadow-xl hover:bg-white/10 active:scale-95 transition-all">
        <span class="material-symbols-outlined">help_outline</span>
    </button>
</div>
</body></html>
